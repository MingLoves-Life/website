<!DOCTYPE html>

  <head>

    <meta name="viewport" content="width=1080, height=1920">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      @font-face { font-family: 'PingFang SC'; src: local('PingFang SC'); }
      @font-face { font-family: 'Noto Sans SC'; src: local('Noto Sans SC'); }
      body { font-family: "Noto Sans SC", "PingFang SC", system-ui, sans-serif; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
      #bg { position: absolute; inset: 0; background: #000; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-ljx1" id="root" data-composition-id="destiny-tiktok-v1" data-start="0" data-width="1080" data-height="1920" data-duration="45">
      <div data-hf-id="hf-2xc0" id="bg"></div>

      <!-- Frame 1: Hook (0-3s) 月薪3千 vs 月薪3万 -->
      <div data-hf-id="hf-i0hx" id="frame-01" class="clip" data-start="0" data-duration="3" data-track-index="1" data-composition-src="compositions/01-hook.html" data-composition-id="01-hook"></div>

      <!-- Frame 2: 沉默解除 (3-12s) -->

      <!-- Frame 4 录屏视频 — 必须是 #root 直接子级 -->
      <video
        id="demo-video"
        class="clip"
        src="assets/1990-02-05-f-6/en-clip-kf.mp4"
        data-start="25"
        data-duration="15"
        data-track-index="2"
        data-allow-occlusion="true"
        muted

        style="
          position: absolute;
          left: 281px; top: 277px;
          width: 518px; height: 917px;
          object-fit: cover;
          border-radius: 50px;
          z-index: 2;
        "

      <div data-hf-id="hf-f2eb" id="frame-05" class="clip" data-start="40" data-duration="5" data-track-index="1" data-composition-src="compositions/05-cta.html" data-composition-id="05-cta"></div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      // 主时间线为空——每个子合成有自己独立的时间线
      window.__timelines["destiny-tiktok-v1"] = tl;
