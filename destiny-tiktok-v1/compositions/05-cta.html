<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Frame 05 — CTA</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      @font-face { font-family: 'Inter'; src: local('Inter'); }
      body { background: #000; overflow: hidden; font-family: "Inter", system-ui, sans-serif; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; }

      #shader-bg5 { position: absolute; inset: 0; width: 1080px; height: 1920px; display: block; }

      /* Light burst canvas — centered gold explosion */
      #burst-canvas { position: absolute; inset: 0; width: 1080px; height: 1920px; display: block; pointer-events: none; }

      .clip { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; padding: 0 80px; }

      /* Outer ring SVG */
      #ring-svg {
        position: absolute;
        left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        opacity: 0;
        will-change: opacity, transform;
      }

      .cta-q {
        font-size: 56px; font-weight: 300; text-align: center;
        color: rgba(255,255,255,0.6); margin-bottom: 16px;
        opacity: 0; will-change: transform, opacity;
        letter-spacing: 0.01em;
      }
      .cta-ans {
        font-size: 108px; font-weight: 900; text-align: center;
        letter-spacing: -0.03em; line-height: 1;
        margin-bottom: 56px; opacity: 0;
        will-change: transform, opacity, filter;
      }
      .cta-ans span {
        background: linear-gradient(135deg, #c9a84c 0%, #fff8c0 45%, #c9a84c 80%, #8a6010 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }

      .cta-rule {
        width: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,0.8), transparent);
        margin: 0 auto 56px;
        opacity: 0;
        will-change: width, opacity;
      }

      /* Pill button */
      .cta-pill {
        position: relative;
        background: linear-gradient(135deg, #c9a84c 0%, #e8c96a 50%, #c9a84c 100%);
        color: #000;
        font-size: 36px; font-weight: 800;
        padding: 32px 48px;
        width: 100%;
        border-radius: 100px;
        text-align: center;
        opacity: 0;
        will-change: transform, opacity;
        letter-spacing: 0.01em;
        box-shadow: 0 0 60px rgba(201,168,76,0.5), 0 0 120px rgba(201,168,76,0.2);
        overflow: hidden;
      }
      /* Sheen sweep on pill */
      .pill-sheen {
        position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
        transform: skewX(-20deg);
        will-change: left;
      }

      .cta-sub {
        font-size: 36px; color: rgba(255,255,255,0.45);
        text-align: center; margin-top: 24px; opacity: 0;
        will-change: opacity;
      }

      /* Corner brackets */
      .bracket { position: absolute; width: 56px; height: 56px; opacity: 0; will-change: opacity, transform; }
      .bracket::before, .bracket::after { content: ''; position: absolute; background: rgba(201,168,76,0.7); }
      .bracket.tl { top: 24px; left: 24px; }
      .bracket.tl::before { top:0;left:0;width:100%;height:2px; }
      .bracket.tl::after  { top:0;left:0;width:2px;height:100%; }
      .bracket.tr { top: 24px; right: 24px; }
      .bracket.tr::before { top:0;right:0;width:100%;height:2px; }
      .bracket.tr::after  { top:0;right:0;width:2px;height:100%; }
      .bracket.bl { bottom: 24px; left: 24px; }
      .bracket.bl::before { bottom:0;left:0;width:100%;height:2px; }
      .bracket.bl::after  { bottom:0;left:0;width:2px;height:100%; }
      .bracket.br { bottom: 24px; right: 24px; }
      .bracket.br::before { bottom:0;right:0;width:100%;height:2px; }
      .bracket.br::after  { bottom:0;right:0;width:2px;height:100%; }

      .scanlines {
        position: absolute; inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.05) 3px, rgba(0,0,0,0.05) 4px);
        pointer-events: none; z-index: 10;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="05-cta"
      data-width="1080"
      data-height="1920"
      data-duration="5"
    >
      <canvas id="shader-bg5"></canvas>
      <canvas id="burst-canvas"></canvas>
      <div class="scanlines"></div>

      <!-- Rotating outer ring -->
      <svg id="ring-svg" width="900" height="900" viewBox="0 0 900 900" data-layout-allow-overflow>
        <circle cx="450" cy="450" r="420"
          fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1"
          stroke-dasharray="8 16"/>
        <circle cx="450" cy="450" r="380"
          fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"
          stroke-dasharray="4 24"/>
        <!-- 8 diamond marks on outer ring -->
        <g id="ring-marks">
          <polygon points="450,22 458,34 450,46 442,34" fill="rgba(201,168,76,0.5)"/>
          <polygon points="878,450 866,442 854,450 866,458" fill="rgba(201,168,76,0.5)"/>
          <polygon points="450,878 442,866 450,854 458,866" fill="rgba(201,168,76,0.5)"/>
          <polygon points="22,450 34,458 46,450 34,442" fill="rgba(201,168,76,0.5)"/>
        </g>
      </svg>

      <!-- Corner brackets -->
      <div class="bracket tl" id="b-tl"></div>
      <div class="bracket tr" id="b-tr"></div>
      <div class="bracket bl" id="b-bl"></div>
      <div class="bracket br" id="b-br"></div>

      <section id="scene-cta" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div id="cta-q" class="cta-q">That was someone else's chart.</div>
        <div id="cta-ans" class="cta-ans">What about<br><span>yours?</span></div>
        <div id="cta-rule" class="cta-rule"></div>
        <div id="cta-pill" class="cta-pill" data-layout-allow-overflow>
          <span class="pill-sheen" id="pill-sheen"></span>
          Free Reading · Link in Bio
        </div>
        <div id="cta-sub" class="cta-sub">2 minutes. Find out which type you are.</div>
      </section>
    </div>

    <script>
      // ── WebGL bright gold burst shader ────────────────────────────────
      (function(){
        var canvas = document.getElementById('shader-bg5');
        canvas.width = 1080; canvas.height = 1920;
        var gl = canvas.getContext('webgl');
        if (!gl) { canvas.style.background = '#060400'; return; }
        var vs=`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=(a_pos+1.0)*0.5;gl_Position=vec4(a_pos,0,1);}`;
        var fs=`precision mediump float;varying vec2 v_uv;uniform float u_t;uniform vec2 u_res;
          float hash(vec2 p){p=fract(p*vec2(234.34,435.345));p+=dot(p,p+34.23);return fract(p.x*p.y);}
          float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
          float fbm(vec2 p){float v=0.0,a=0.5;mat2 R=mat2(0.8,0.6,-0.6,0.8);for(int i=0;i<4;i++){v+=a*noise(p);p=R*p*2.1;a*=0.5;}return v;}
          void main(){
            vec2 uv=v_uv;uv.y=1.0-uv.y;uv.x*=u_res.x/u_res.y;
            float t=u_t*0.15;
            vec2 q=vec2(fbm(uv*1.8+t*0.4),fbm(uv*1.8+vec2(3.1,7.4)+t*0.3));
            vec2 r=vec2(fbm(uv*1.8+q*3.0+t*0.2),fbm(uv*1.8+q*3.0+vec2(8.3,2.8)+t*0.15));
            float n=fbm(uv*1.8+r*1.5);
            vec3 dark=vec3(0.03,0.02,0.005);
            vec3 mid=vec3(0.2,0.14,0.03);
            vec3 gold=vec3(0.85,0.68,0.22);
            vec3 col=mix(dark,mid,smoothstep(0.0,0.4,n));
            col=mix(col,gold,smoothstep(0.38,0.68,n)*0.55);
            float vig=1.0-0.65*pow(length(v_uv-vec2(0.5,0.5))*1.3,2.0);
            col*=vig;
            gl_FragColor=vec4(col,1.0);
          }`;
        function mkS(t,s){var sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
        var p=gl.createProgram();
        gl.attachShader(p,mkS(gl.VERTEX_SHADER,vs));gl.attachShader(p,mkS(gl.FRAGMENT_SHADER,fs));
        gl.linkProgram(p);gl.useProgram(p);
        var b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);
        gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
        var ap=gl.getAttribLocation(p,'a_pos');gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
        var uT=gl.getUniformLocation(p,'u_t'),uR=gl.getUniformLocation(p,'u_res');
        gl.uniform2f(uR,1080,1920);gl.viewport(0,0,1080,1920);
        window.__s5p={t:0};window.__s5d=function(t){gl.uniform1f(uT,t);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);};
        window.__s5d(0);
      })();

      // ── Canvas 2D light burst ─────────────────────────────────────────
      (function(){
        var canvas = document.getElementById('burst-canvas');
        canvas.width = 1080; canvas.height = 1920;
        var ctx = canvas.getContext('2d');
        // Deterministic hash
        function hash(x,y){var n=(x*374761393+y*668265263)|0;n=(n^(n>>13))*1274126177;return((n^(n>>16))&0x7fffffff)/0x7fffffff;}

        window.__burstDraw = function(progress) {
          ctx.clearRect(0,0,1080,1920);
          if (progress <= 0) return;
          var cx = 540, cy = 960;
          var p = Math.min(progress, 1);

          // 16 radial spokes
          for (var i = 0; i < 16; i++) {
            var ang = (i / 16) * Math.PI * 2;
            var len = (120 + hash(i,0) * 200) * p;
            var w = (1.5 + hash(i,1) * 2.5) * p;
            var alpha = (0.3 + hash(i,2) * 0.3) * p * (1 - p * 0.3);
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(ang)*20*p, cy + Math.sin(ang)*20*p);
            ctx.lineTo(cx + Math.cos(ang)*len, cy + Math.sin(ang)*len);
            ctx.strokeStyle = 'rgba(201,168,76,' + alpha.toFixed(2) + ')';
            ctx.lineWidth = w;
            ctx.stroke();
          }

          // Central glow
          var gr = ctx.createRadialGradient(cx,cy,0,cx,cy,400*p);
          gr.addColorStop(0, 'rgba(255,240,160,' + (0.25*p).toFixed(2) + ')');
          gr.addColorStop(0.3, 'rgba(201,168,76,' + (0.12*p).toFixed(2) + ')');
          gr.addColorStop(1, 'rgba(201,168,76,0)');
          ctx.fillStyle = gr;
          ctx.fillRect(0,0,1080,1920);
        };
        window.__burstDraw(0);
      })();

      // ── GSAP Timeline ─────────────────────────────────────────────────
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      var sp = window.__s5p || { t: 0 };
      tl.to(sp, { t: 6, duration: 5, ease: 'none',
        onUpdate: function(){ if(window.__s5d) window.__s5d(sp.t); }
      }, 0);

      // Light burst on entry
      var bp = { v: 0 };
      tl.to(bp, { v: 0.9, duration: 0.6, ease: 'power3.out',
        onUpdate: function(){ if(window.__burstDraw) window.__burstDraw(bp.v); }
      }, 0)
      .to(bp, { v: 0.2, duration: 0.8, ease: 'power2.in',
        onUpdate: function(){ if(window.__burstDraw) window.__burstDraw(bp.v); }
      }, 0.6);

      // Ring fades + rotates slowly
      tl.to('#ring-svg', { opacity: 1, scale: 1, duration: 0.8, ease: 'power2.out' }, 0.1)
        .from('#ring-svg', { scale: 0.85 }, 0.1);
      var ringDur = 5 - 0.1, ringCycle = 8;
      tl.to('#ring-marks', {
        rotation: 45, transformOrigin: '450px 450px',
        duration: ringDur, ease: 'none'
      }, 0.1);

      // Corner brackets
      tl.fromTo(['#b-tl','#b-tr','#b-bl','#b-br'],
        { opacity: 0, scale: 1.5 },
        { opacity: 1, scale: 1, duration: 0.3, stagger: 0.05, ease: 'power3.out' }, 0.15);

      // Question fades from below
      tl.fromTo('#cta-q', { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.45, ease: 'power3.out' }, 0.2);

      // Answer: scale + blur slam
      tl.fromTo('#cta-ans',
        { opacity: 0, scale: 1.3, filter: 'blur(20px)' },
        { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.6, ease: 'power4.out' }, 0.85);

      // Horizontal rule sweeps
      tl.to('#cta-rule', { width: 420, opacity: 1, duration: 0.4, ease: 'power3.inOut' }, 1.55);

      // Pill springs up with overshoot
      tl.fromTo('#cta-pill',
        { opacity: 0, scale: 0.65, y: 50 },
        { opacity: 1, scale: 1, y: 0, duration: 0.6, ease: 'back.out(1.8)' }, 2.0);

      // Sheen sweep across pill
      tl.to('#pill-sheen', { left: '160%', duration: 0.7, ease: 'power2.inOut' }, 2.4);

      // Sub text
      tl.to('#cta-sub', { opacity: 1, duration: 0.4 }, 2.9);

      // Pill pulse (finite breathe — scale stays under 1 to avoid overflow at sample points)
      var holdStart = 3.3, cycle = 1.0, holdDur = 5 - holdStart;
      tl.to('#cta-pill', {
        scale: 1.0, boxShadow: '0 0 80px rgba(201,168,76,0.7), 0 0 160px rgba(201,168,76,0.3)',
        duration: cycle/2, ease: 'sine.inOut',
        yoyo: true, repeat: Math.max(0, Math.floor(holdDur/(cycle/2)) - 1)
      }, holdStart);

      window.__timelines['05-cta'] = tl;
    </script>
  </body>
</html>
