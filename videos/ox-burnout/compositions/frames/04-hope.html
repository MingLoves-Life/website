  <div id="04-hope-overlay" class="clip" data-start="0" data-duration="3.52" data-track-index="1" style="position:absolute;inset:0;background:rgba(0,0,0,0.55);"></div>

  <!-- Track 2: text content -->
  <div id="04-hope-text-clip" class="clip" data-start="0" data-duration="3.52" data-track-index="2" style="position:relative;z-index:10;">

  <script>
    (function () {
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // t=0.00s — "That changes." slides up from +60px, power3.out 0.4s

        { opacity: 1, duration: 0.4, ease: 'power2.out' },
        1.18
      );

      // Hold to full 2.94s
      tl.to({}, { duration: 0.01 }, 2.93);
