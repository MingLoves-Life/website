<template data-composition-id="02-recognition" data-width="1080" data-height="1920">
<div id="root" data-composition-id="02-recognition" data-width="1080" data-height="1920">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,700;0,900&display=swap');

    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Barlow', sans-serif;
    }

    .line-ox-people {
      position: absolute;
      left: 0;
      right: 0;
      top: 600px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 90px;
      line-height: 1.1;
      color: #F0ECE5;
      text-align: center;
      will-change: transform, opacity;
      opacity: 0;
    }

    .line-hardest {
      position: absolute;
      left: 0;
      right: 0;
      top: 750px;
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 115px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: #E85D26;
      text-align: center;
      will-change: transform, opacity;
      opacity: 0;
    }

    .line-in-any-room {
      position: absolute;
      left: 0;
      right: 0;
      top: 900px;
      font-family: 'Barlow', sans-serif;
      font-weight: 400;
      font-size: 72px;
      line-height: 1.1;
      color: #F0ECE5;
      text-align: center;
      will-change: opacity;
      opacity: 0;
    }
  </style>

  <!-- Track 0: full-bleed background -->
  <div class="clip" data-start="0" data-duration="3.3" data-track-index="0" style="background:#111111;position:absolute;inset:0;"></div>

  <!-- Track 1: kinetic type content -->
  <div class="clip" data-start="0" data-duration="3.3" data-track-index="1">
    <!-- Scene 1: "Ox people are" slides up -->
    <div class="line-ox-people" id="line-ox-people">Ox people are</div>

    <!-- Scene 2: "the hardest workers" spring-pops in, fire-orange -->
    <div class="line-hardest" id="line-hardest">the hardest workers</div>

    <!-- Scene 3: "in any room," fades in -->
    <div class="line-in-any-room" id="line-in-any-room">in any room,</div>
  </div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // Scene 1 (0.0s): "Ox people are" slides up from y+120px, power3.out 0.5s
      tl.fromTo(
        '#line-ox-people',
        { y: 120, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: 'power3.out' },
        0.0
      );

      // Scene 2 (1.02s): "the hardest workers" spring-pops in, scale 0.85→1.0, back.out(1.7)
      tl.fromTo(
        '#line-hardest',
        { scale: 0.85, opacity: 0 },
        { scale: 1.0, opacity: 1, duration: 0.5, ease: 'back.out(1.7)' },
        1.02
      );

      // Scene 3 (2.02s): "in any room," fades in
      tl.fromTo(
        '#line-in-any-room',
        { opacity: 0 },
        { opacity: 1, duration: 0.4, ease: 'power2.out' },
        2.02
      );

      // Scene 4 (3.12–3.3s): hold — extend timeline to full 3.3s
      tl.to({}, { duration: 0.01 }, 3.29);

      window.__timelines['02-recognition'] = tl;
    })();
  </script>
</div>
</template>
