<template data-composition-id="02-pivot" data-width="1080" data-height="1920">
<div id="root" data-composition-id="02-pivot" data-width="1080" data-height="1920" data-duration="1.74">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@900&display=swap');

    #root {
      position: relative;
      isolation: isolate;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Barlow', sans-serif;
    }

    #pivot-text {
      position: absolute;
      left: 80px;
      right: 80px;
      top: 820px;
      transform: translateY(-50%) scale(0.7);
      font-family: 'Barlow', sans-serif;
      font-weight: 900;
      font-size: 95px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: #E85D26;
      text-align: center;
      opacity: 0;
    }
  </style>

  <!-- Track 1: dark overlay (video lives in host index.html, track 0) -->
  <div id="pivot-overlay" data-layout-allow-occlusion="true" class="clip" data-start="0" data-duration="1.74" data-track-index="1"
    style="position:absolute;inset:0;background:rgba(0,0,0,0.65);" style="position:absolute;inset:0;z-index:10;">></div>

  <!-- Track 2: pivot text -->
  <div id="pivot-content" data-layout-allow-occlusion="true" class="clip" data-start="0" data-duration="1.74" data-track-index="2"
    style="position:absolute;inset:0;" style="position:absolute;inset:0;z-index:10;">>
    <div id="pivot-text" data-layout-allow-occlusion="true">It's in your birth chart.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    (function () {
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // Slam in at t=0: scale 0.7→1.0, opacity 0→1, back.out(1.5), 0.35s
      tl.fromTo(
        '#pivot-text',
        { opacity: 0, scale: 0.7, transformOrigin: '50% 50%' },
        { opacity: 1, scale: 1.0, duration: 0.35, ease: 'back.out(1.5)' },
        0.0
      );

      // Hold to end of composition (identity tween to pin timeline length)
      tl.to({}, { duration: 0.01 }, 1.07);

      window.__timelines['02-pivot'] = tl;
    })();
  </script>
</div>
</template>
