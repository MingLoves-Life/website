<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #F0ECE5;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="31.5"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="3.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-recognition"
        class="scene"
        data-composition-id="02-recognition"
        data-composition-src="compositions/frames/02-recognition.html"
        data-start="3.5"
        data-duration="6.3"
        data-track-index="1"
      ></div>

      <div
        id="el-03-mechanism"
        class="scene"
        data-composition-id="03-mechanism"
        data-composition-src="compositions/frames/03-mechanism.html"
        data-start="9.3"
        data-duration="10.8"
        data-track-index="0"
      ></div>

      <div
        id="el-04-hope"
        class="scene"
        data-composition-id="04-hope"
        data-composition-src="compositions/frames/04-hope.html"
        data-start="20.1"
        data-duration="6.7"
        data-track-index="1"
      ></div>

      <div
        id="el-05-cta"
        class="scene"
        data-composition-id="05-cta"
        data-composition-src="compositions/frames/05-cta.html"
        data-start="26.3"
        data-duration="5.2"
        data-track-index="0"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-02-recognition", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 9.3);
        tl.fromTo("#el-03-mechanism", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 9.3);
        tl.to("#el-04-hope", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 26.3);
        tl.fromTo("#el-05-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 26.3);
        tl.to({}, { duration: 31.5 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  <audio id="vo-main" class="clip" src="public/ox.mp3" data-start="0" data-duration="33.49" data-track-index="10" preload="auto"></audio>
  </body>
</html>
